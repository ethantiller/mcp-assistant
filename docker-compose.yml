services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python mcp/server.py
    environment:
      MCP_HOST: "0.0.0.0"
    ports:
      - "8001:8001"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run uvicorn api:app --host 0.0.0.0 --port 8000
    environment:
      MCP_URL: "http://mcp:8001/mcp"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
    ports:
      - "8000:8000"
    depends_on:
      - mcp

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api
